{% extends "base.html" %}

{% block content %}

<h2>Ajouter un employé</h2>

<form method="POST">
    <input class="form-control mb-2" name="nom" placeholder="Nom">
    <input class="form-control mb-2" name="prenom" placeholder="Prénom">
    <input class="form-control mb-2" name="poste" placeholder="Poste">
    <input class="form-control mb-2" name="salaire" placeholder="Salaire">

    <button class="btn btn-success">Ajouter</button>
</form>

{% endblock %}
