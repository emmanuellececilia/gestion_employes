{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Liste des employés</h2>

<a href="/ajouter" class="btn btn-primary mb-3">+ Ajouter</a>

<table class="table table-bordered table-hover shadow">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Poste</th>
            <th>Salaire</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
        {% for emp in employes %}
        <tr>
            <td>{{ emp.id }}</td>
            <td>{{ emp.nom }}</td>
            <td>{{ emp.prenom }}</td>
            <td>{{ emp.poste }}</td>
            <td>{{ emp.salaire }}</td>
            <td>
                <a href="/modifier/{{ emp.id }}" class="btn btn-warning btn-sm">Modifier</a>
                <a href="/supprimer/{{ emp.id }}" class="btn btn-danger btn-sm">Supprimer</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% endblock %}
